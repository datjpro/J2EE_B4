<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{_layout :: layout(~{::section}, 'Product List')}">
<section>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Product List</h1>
        <a th:href="@{/products/create}" class="btn btn-primary">Create Product</a>
    </div>

    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Image</th>
                <th>Price</th>
                <th>Category</th>
                <th class="text-end">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(listProduct)}">
                <td colspan="6" class="text-center text-muted py-4">No products yet.</td>
            </tr>
            <tr th:each="product : ${listProduct}">
                <td th:text="${product.id}"></td>
                <td th:text="${product.name}"></td>
                <td>
                    <img th:if="${product.image != null and !product.image.isBlank()}"
                         th:src="${#strings.startsWith(product.image, 'http') ? product.image : '/images/' + product.image}"
                         alt="Product image"
                         class="product-thumb">
                    <span th:unless="${product.image != null and !product.image.isBlank()}" class="text-muted">N/A</span>
                </td>
                <td th:text="${product.price} + ' VND'"></td>
                <td th:text="${product.category != null ? product.category.name : 'N/A'}"></td>
                <td class="text-end">
                    <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-outline-warning">Edit</a>
                    <a th:href="@{/products/delete/{id}(id=${product.id})}"
                       class="btn btn-sm btn-outline-danger"
                       onclick="return confirm('Delete this product?');">Delete</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</section>
</html>
