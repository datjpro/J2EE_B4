<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{_layout :: layout(~{::section}, 'Create Product')}">
<section>
    <div class="mb-3">
        <h1 class="h3 mb-0">Create Product</h1>
        <p class="text-muted mb-0">Fill in product information and save.</p>
    </div>

    <form th:action="@{/products/create}" method="post" th:object="${productForm}" enctype="multipart/form-data" class="row g-3">
        <div class="col-12">
            <label for="name" class="form-label">Name</label>
            <input id="name" type="text" class="form-control" th:field="*{name}" placeholder="Product name">
            <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="col-md-6">
            <label for="price" class="form-label">Price</label>
            <input id="price" type="number" min="0" class="form-control" th:field="*{price}" placeholder="0">
            <div class="text-danger small" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
        </div>

        <div class="col-md-6">
            <label for="categoryId" class="form-label">Category</label>
            <select id="categoryId" class="form-select" th:field="*{categoryId}">
                <option value="">Choose category</option>
                <option th:each="cat : ${listCategory}" th:value="${cat.id}" th:text="${cat.name}"></option>
            </select>
            <div class="text-danger small" th:if="${#fields.hasErrors('categoryId')}" th:errors="*{categoryId}"></div>
        </div>

        <div class="col-12">
            <label for="imageUrl" class="form-label">Image URL (optional)</label>
            <input id="imageUrl" type="text" class="form-control" th:field="*{imageUrl}" placeholder="https://...">
            <div class="text-danger small" th:if="${#fields.hasErrors('imageUrl')}" th:errors="*{imageUrl}"></div>
        </div>

        <div class="col-12">
            <label for="imageFile" class="form-label">Upload image (optional)</label>
            <input id="imageFile" type="file" class="form-control" th:field="*{imageFile}" accept="image/*">
            <div class="text-danger small" th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}"></div>
        </div>

        <div class="col-12 d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a th:href="@{/products}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</section>
</html>
